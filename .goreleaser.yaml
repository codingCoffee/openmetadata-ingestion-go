# GoReleaser config — https://goreleaser.com
# Run via `just release patch|minor|major` (executes inside the
# goreleaser/goreleaser docker image; see the justfile).
version: 2

project_name: omingest

before:
  hooks:
    - go mod tidy

builds:
  - id: omingest
    main: ./cmd/omingest
    binary: omingest
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/codingcoffee/openmetadata-ingestion-go/internal/cli.version={{ .Version }}

archives:
  - id: omingest
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

# release target (GitHub owner/repo) is auto-detected from the git remote.
